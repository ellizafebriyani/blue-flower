<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/flowers.png" type="image/x-icon">
    <title>Flowers</title>
</head>

<body>

    <audio id="bgMusic" loop>
        <source src="img/b2.mp3" type="audio/mpeg">
    </audio>

    <button id="musicBtn">▶ Play Music</button>

    <div class="greetings">
        <span>H</span>
        <span>A</span>
        <span>I</span>
    </div>

    <div class="greetings">
        <span>T</span>
        <span>H</span>
        <span>E</span>
        <span>R</span>
        <span>E</span>
        <span>!</span>
    </div>

    <div class="description">
        <span>I've got something spesial for you!!</span>
    </div>

    <div class="button">
        <button>
            <a href="flower.html">Tap Here</a>
        </button>
    </div>

    <style>
        #musicBtn{
            position:fixed;
            top:20px;
            right:20px;
            z-index:99999;
            padding:10px 18px;
            border:none;
            border-radius:10px;
            background:#ff69b4;
            color:#fff;
            font-size:14px;
            cursor:pointer;
        }
    </style>

    <script>
        const music = document.getElementById("bgMusic");
        const btn = document.getElementById("musicBtn");

        if(localStorage.getItem("musicPlaying") === "true"){
            const savedTime = parseFloat(localStorage.getItem("musicTime")) || 0;
            music.currentTime = savedTime;

            music.play().then(()=>{
                btn.innerHTML = "⏸ Stop Music";
            }).catch(()=>{});
        }

        btn.addEventListener("click",()=>{

            if(music.paused){

                music.currentTime = parseFloat(localStorage.getItem("musicTime")) || 0;
                music.play();

                localStorage.setItem("musicPlaying","true");
                btn.innerHTML = "⏸ Stop Music";

            }else{

                localStorage.setItem("musicTime", music.currentTime);
                music.pause();

                localStorage.setItem("musicPlaying","false");
                btn.innerHTML = "▶ Play Music";
            }
        });

        setInterval(()=>{
            if(!music.paused){
                localStorage.setItem("musicTime", music.currentTime);
            }
        },1000);
    </script>

</body>
</html>
